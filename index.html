<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ร้านข้าวมันไก่บ้านเรา</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Kanit',sans-serif;}
body{background:#f8f8f8;}

header{
background:#111;
color:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1625944525533-473f1a3d54d3");
background-size:cover;
background-position:center;
color:white;
text-align:center;
padding:100px 20px;
}

.products{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:60px;
}

.card{
background:white;
width:280px;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.1);
cursor:pointer;
transition:.3s;
}

.card:hover{transform:translateY(-10px);}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:20px;
text-align:center;
}

.price{
color:#c9a227;
font-weight:bold;
margin-top:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}
</style>
</head>
<body>

<header style="background:#111;color:white;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;">
<h2>🍗 ร้านข้าวมันไก่บ้านเรา</h2>
<div>
<a href="index.html" style="color:white;margin-left:20px;text-decoration:none;">หน้าแรก</a>
<a href="about.html" style="color:white;margin-left:20px;text-decoration:none;">เกี่ยวกับเรา</a>
<a href="cart.html" style="color:white;margin-left:20px;text-decoration:none;">🛒 ตะกร้า</a>
<a href="contact.html" style="color:white;margin-left:20px;text-decoration:none;">ติดต่อ</a>
<a href="admin.html" style="color:#ffd700;margin-left:20px;text-decoration:none;">⚙ แอดมิน</a>
</div>
</header>

<section class="hero">
<h1>อร่อยทุกคำ สูตรต้นตำรับ</h1>
<p>สั่งง่าย ส่งไว สดใหม่ทุกวัน</p>
</section>

<section class="products" id="productList"></section>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function renderProducts(){
let html="";
products.forEach((p,index)=>{
html += `
<div class="card" onclick="goProduct(${index})">
<img src="${p.image}">
<div class="card-body">
<h3>${p.name}</h3>
<div class="price">${p.price} บาท</div>
</div>
</div>
`;
});
document.getElementById("productList").innerHTML = html;
}

function goProduct(index){
localStorage.setItem("selectedProduct", index);
window.location.href="product.html";
}

renderProducts();
</script>

</section>

<footer>
<p>เปิดทุกวัน 08:00 - 18:00 | โทร 012-345-6789</p>
</footer>

<script>
function goProduct(name,price){
localStorage.setItem("productName", name);
localStorage.setItem("productPrice", price);
window.location.href="product.html";
}
</script>

</body>
</html>
